<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip so dolphins don't overflow the rounded card -->
    <clipPath id="card">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect width="64" height="64" rx="16" fill="#1a1a2e"/>
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>

  <g clip-path="url(#card)">

    <!-- ═══════════════════════════════════════════
         LEFT DOLPHIN — mint green (#00E5A0)
         Snout faces right at ≈(30,19).
         Head melon curves up-left, back arcs down-left,
         tail at lower-left with two distinct flukes.
    ════════════════════════════════════════════ -->
    <!-- Body -->
    <path d="
      M 30,19
      C 27,14 22,11 17,13
      C 12,16 7,23 6,32
      C 5,40 7,47 12,52
      L 7,57
      L 12,51
      L 16,56
      C 17,52 19,48 22,44
      C 25,39 28,30 29,23
      Z"
      fill="#00E5A0"
      stroke="#1a1a2e"
      stroke-width="1.2"
      stroke-linejoin="round"
    />
    <!-- Belly highlight — lighter area on inner side -->
    <path d="
      M 29,22
      C 27,27 25,34 23,40
      C 21,45 19,49 18,52
      C 20,48 22,44 24,39
      C 26,33 28,26 29,20
      Z"
      fill="white"
      fill-opacity="0.18"
    />
    <!-- Dorsal fin -->
    <path d="M 13,17 C 11,12 10,6 12,4 C 13,9 15,14 15,19 Z"
      fill="#00E5A0"
      stroke="#1a1a2e"
      stroke-width="1"
      stroke-linejoin="round"
    />
    <!-- Pectoral fin (small, on belly side) -->
    <path d="M 21,29 C 18,26 15,29 17,33 C 18,30 21,30 21,29 Z"
      fill="#00E5A0"
      stroke="#1a1a2e"
      stroke-width="0.7"
    />
    <!-- Eye -->
    <circle cx="24.5" cy="16.5" r="2"   fill="#1a1a2e"/>
    <circle cx="25.1" cy="15.9" r="0.7" fill="white"/>
    <!-- Smile -->
    <path d="M 27,21 Q 29.5,22.5 27,24"
      stroke="#1a1a2e" stroke-width="1" fill="none" stroke-linecap="round"
    />

    <!-- ═══════════════════════════════════════════
         RIGHT DOLPHIN — dark navy, exact mirror
         transform: x' = 64 − x  (scale -1 + translate)
    ════════════════════════════════════════════ -->
    <g transform="scale(-1,1) translate(-64,0)">
      <!-- Body -->
      <path d="
        M 30,19
        C 27,14 22,11 17,13
        C 12,16 7,23 6,32
        C 5,40 7,47 12,52
        L 7,57
        L 12,51
        L 16,56
        C 17,52 19,48 22,44
        C 25,39 28,30 29,23
        Z"
        fill="#1a1a2e"
        stroke="#00E5A0"
        stroke-width="1.2"
        stroke-linejoin="round"
      />
      <!-- Belly highlight on dark dolphin (subtle) -->
      <path d="
        M 29,22
        C 27,27 25,34 23,40
        C 21,45 19,49 18,52
        C 20,48 22,44 24,39
        C 26,33 28,26 29,20
        Z"
        fill="#00E5A0"
        fill-opacity="0.06"
      />
      <!-- Dorsal fin -->
      <path d="M 13,17 C 11,12 10,6 12,4 C 13,9 15,14 15,19 Z"
        fill="#1a1a2e"
        stroke="#00E5A0"
        stroke-width="1"
        stroke-linejoin="round"
      />
      <!-- Pectoral fin -->
      <path d="M 21,29 C 18,26 15,29 17,33 C 18,30 21,30 21,29 Z"
        fill="#1a1a2e"
        stroke="#00E5A0"
        stroke-width="0.7"
      />
      <!-- Eye -->
      <circle cx="24.5" cy="16.5" r="2"   fill="#00E5A0" fill-opacity="0.5"/>
      <circle cx="25.1" cy="15.9" r="0.7" fill="white"   fill-opacity="0.9"/>
      <!-- Smile -->
      <path d="M 27,21 Q 29.5,22.5 27,24"
        stroke="#00E5A0" stroke-width="1" fill="none" stroke-linecap="round"
      />
    </g>

    <!-- ═══════════════════════════════════════════
         HEART — centered between snouts at top
    ════════════════════════════════════════════ -->
    <path d="
      M 32,14
      C 32,14 29.2,11.6 29.2,9.8
      C 29.2,8.6 30.3,7.8 31.2,8.8
      L 32,9.7
      L 32.8,8.8
      C 33.7,7.8 34.8,8.6 34.8,9.8
      C 34.8,11.6 32,14 32,14 Z"
      fill="#00E5A0"
    />

    <!-- ═══════════════════════════════════════════
         GOLD COIN — center of the arch
    ════════════════════════════════════════════ -->
    <circle cx="32" cy="37" r="8"   fill="#F2C040"/>
    <circle cx="32" cy="37" r="6.4" fill="none" stroke="#C89820" stroke-width="0.9"/>

    <!-- Euro symbol (path-drawn, no font) -->
    <path d="M 35.8,33.8 C 34.1,32 31,32 29.2,33.8 C 26.9,36.2 26.9,40.8 29.2,43.2 C 31,45 34.1,45 35.8,43.2"
      stroke="#7A5510" stroke-width="1.3" fill="none" stroke-linecap="round"
    />
    <line x1="26.5" y1="36.5" x2="34.5" y2="36.5" stroke="#7A5510" stroke-width="1.15"/>
    <line x1="26.5" y1="39.5" x2="34.5" y2="39.5" stroke="#7A5510" stroke-width="1.15"/>

    <!-- ═══════════════════════════════════════════
         TREND ARROW — mint green, zigzag upward
         Runs from lower-left through coin to upper-right
    ════════════════════════════════════════════ -->
    <path d="M 18,53 L 24,45 L 28,48 L 38,33"
      stroke="#00E5A0"
      stroke-width="2.4"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Arrowhead pointing upper-right -->
    <path d="M 35,29.5 L 42,30.5 L 38,35.5 Z" fill="#00E5A0"/>

  </g>
</svg>
